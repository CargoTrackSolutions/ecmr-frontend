# Extend the default stages with the archive stage intended to push artifacts to the nexus
# Bear in mind that the K8s cluster may pick up docker images from the registry by itself if
# a particular imagestream is configured as such
stages:
  - build
  - test
  - quality
  - archive

variables:
  NPM_ANGULAR_DOCKER_IMAGE: trion/ng-cli-karma:20.3.5

  ##################################################################################################
  # Definition of variables for project-specific configuration of the pipeline jobs.
  # These variables can be overridden as needed by jobs extending the job templates.
  ##################################################################################################
  # Path to the project directory (relative to ${CI_PROJECT_DIR}).
  # Can either be empty or has to end with a `/`.
  PROJECT_DIR: "angular-frontend/"
  # [RULES] Path to the project's `package.json` file (relative to ${CI_PROJECT_DIR}).
  PACKAGE_JSON_PATH: "package.json"
  # Path to lint - codequality path (relative to ${PROJECT_DIR}).
  ESLINT_CODE_QUALITY_REPORT: "gl-code-quality-report.json"
  # Path to the directory containing coverage report files (relative to ${PROJECT_DIR}).
  COVERAGE_OUTPUT_RELATIVE_PATH: "coverage"
  # Comma-SEPARATED list of paths to LCOV coverage report files. Paths may be absolute or
  # relative to ${PROJECT_DIR}.
  LCOV_REPORT_PATHS: "${COVERAGE_OUTPUT_RELATIVE_PATH}/lcov.info"
  # Whether to enforce successful quality jobs (e.g. sonar analysis) on the default branch. A value
  # of `true` effectively doesn't allow quality jobs to fail on the default branch.
  ENFORCE_QA_ON_DEFAULT_BRANCH: "false"
  # Path to the reference file containing all third-party licenses (relative to ${PROJECT_DIR}).
  REFERENCE_LICENSES_FILE: "third-party-licenses/third-party-licenses.csv"
  # Path to the generated file containing all third-party licenses - i.e. the output of the
  # `license-checker` module (relative to ${PROJECT_DIR}).
  GENERATED_LICENSES_FILE: "generated/third-party-licenses.csv"

build:
  image: ${NPM_ANGULAR_DOCKER_IMAGE}
  stage: build
  tags:
    - active
  script:
    # Output environment variables used in this job. (Can be useful for debugging.)
    - echo "PROJECT_DIR=${PROJECT_DIR}"
    - cd "${PROJECT_DIR}"
    - npm ci
    - npm run build
  artifacts:
    # Save the files produced by this job as job artifacts and allow jobs in subsequent stages to
    # download them.
    paths:
      - "${PROJECT_DIR}dist/"
    expire_in: 1 week
  rules:
    # The build is never allowed to fail.
    - when: on_success
      allow_failure: false

test:
  image: ${NPM_ANGULAR_DOCKER_IMAGE}
  stage: test
  tags:
    - active
  needs:
    - job: build
      artifacts: true
  before_script:
    # Output environment variables used in this job. (Can be useful for debugging.)
    - echo "PROJECT_DIR=${PROJECT_DIR}"
    - cd "${PROJECT_DIR}"
    - npm ci
  script:
    - npm run test -- --code-coverage=true --progress=false --watch=false
  coverage: '/Lines \W+: (\d+\.\d+)%.*/'
  artifacts:
    # Save the files produced by this job as job artifacts and allow jobs in subsequent stages to
    # download them.
    reports:
      junit: $CI_PROJECT_DIR/angular-frontend/coverage/tests/junit-test-results.xml
      coverage_report:
        coverage_format: cobertura
        path: $CI_PROJECT_DIR/angular-frontend/coverage/angular-frontend/cobertura-coverage.xml
    paths:
      - $CI_PROJECT_DIR/angular-frontend/coverage/tests/junit-test-results.xml
      - $CI_PROJECT_DIR/angular-frontend/coverage/angular-frontend/cobertura-coverage.xml
    expire_in: 1 week
  rules:
    # Tests are never allowed to fail.
    - when: on_success
      allow_failure: false

lint:
  image: ${NPM_ANGULAR_DOCKER_IMAGE}
  stage: quality
  tags:
    - ecmr
  needs:
    - job: build
      artifacts: true
  script:
    # Output environment variables used in this job. (Can be useful for debugging.)
    - echo "PROJECT_DIR=${PROJECT_DIR}"
    - cd "${PROJECT_DIR}"
    - npm ci
    # Run the linter with format gitlab
    - npx eslint --output-file gl-code-quality-report.json --format json
  artifacts:
    # Save the files produced by this job as job artifacts and allow jobs in subsequent stages to
    # download them.
    reports:
      codequality: $CI_PROJECT_DIR/${PROJECT_DIR}gl-code-quality-report.json
    paths:
      - "${CI_PROJECT_DIR}/${PROJECT_DIR}${ESLINT_CODE_QUALITY_REPORT}"
    expire_in: 1 week
  rules:
    # Lint is allowed to fail.
    - when: on_success
      allow_failure: true

