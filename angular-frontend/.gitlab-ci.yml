include:
  - template: Code-Quality.gitlab-ci.yml
  - local: '.gitlab/ci_cd_templates/Npm-Angular.gitlab-ci.yml'


# Extend the default stages with the archive stage intended to push artifacts to the nexus
# Bear in mind that the K8s cluster may pick up docker images from the registry by itself if
# a particular imagestream is configured as such
stages:
  - build
  - test
  - quality
  - archive

build:
  stage: build
  tags:
    - ecmr
  extends: .npm-angular-build
  variables:
    PROJECT_DIR: "angular-frontend/"

test:
  stage: test
  tags:
    - ecmr
  extends: .npm-angular-test
  needs:
    - job: build
      artifacts: true
  coverage: '/Lines        : \d+(?:\.\d+)?/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: $CI_PROJECT_DIR/angular-frontend/coverage/cobertura-coverage.xml
      junit: $CI_PROJECT_DIR/angular-frontend/coverage/tests/junit-test-results.xml
  variables:
    PROJECT_DIR: "angular-frontend/"

lint:
  stage: quality
  tags:
    - ecmr
  needs:
    - job: build
      artifacts: true
  extends: .npm-angular-lint
  variables:
    PROJECT_DIR: "angular-frontend/"

code_quality:
  stage: quality
  tags:
    - ecmr
  variables:
    CODECLIMATE_REGISTRY_USERNAME: $CI_REGISTRY_USER
    CODECLIMATE_REGISTRY_PASSWORD: $CI_REGISTRY_PASSWORD

third-party-license-check:
  stage: test
  tags:
    - ecmr
  extends: .npm-angular-third-party-license-check
  variables:
    PROJECT_DIR: "angular-frontend/"

artifacts-archive:
  stage: archive
  extends: .npm-angular-archive
  variables:
    PROJECT_DIR: "angular-frontend/"
    PACKAGE_JSON_PATH: "angular-frontend/package.json"
