<mat-toolbar class="sticky-top">
    <mat-toolbar-row class="d-flex flex-row justify-content-between">
        <mat-label>{{ 'group_overview.title' | translate }}</mat-label>
        <div class="d-flex flex-row gap-2 align-items-center">
            <button mat-flat-button (click)="treeControl.expandAll()" color="primary">
                {{ "group_overview.expand_all" | translate }}
                <mat-icon>expand</mat-icon>
            </button>
            <button mat-flat-button (click)="treeControl.collapseAll()" color="warn">
                {{ "group_overview.collapse_all" | translate }}
                <mat-icon>compress</mat-icon>
            </button>
            <mat-form-field class="mt-4 search-field">
                <mat-label>{{ 'group_overview.search' | translate }}</mat-label>
                <input matInput placeholder="Suche" [(ngModel)]="searchText" (ngModelChange)="applyFilter()"/>
                <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>
        </div>
    </mat-toolbar-row>
</mat-toolbar>
<div class="tree-container overflow-y-scroll">
    <mat-tree [dataSource]="dataSource" [treeControl]="treeControl">
        <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
            <button mat-icon-button disabled></button>
            <ng-container *ngTemplateOutlet="actionButtons; context: { $implicit: node  }"></ng-container>
            @if (node.description) {
                {{ node.name }} -
                <div class="description ms-1">{{ node.description }}</div>
            } @else {
                {{ node.name }}
            }
        </mat-tree-node>
        <!-- This is the tree node template for expandable nodes -->
        <mat-tree-node *matTreeNodeDef="let node;when: hasChild" matTreeNodePadding matTreeNodeToggle>
            <button mat-icon-button matTreeNodeToggle
                    [attr.aria-label]="'Toggle ' + node.name">
                <mat-icon class="mat-icon-rtl-mirror" color="accent">
                    {{ treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
                </mat-icon>
            </button>
            <ng-container *ngTemplateOutlet="actionButtons; context: { $implicit: node  }"></ng-container>
            @if (node.description) {
                {{ node.name }}
                <div class="description ms-1"> - {{ node.description }}</div>
            } @else {
                {{ node.name }}
            }
        </mat-tree-node>
    </mat-tree>
</div>
<ng-template #actionButtons let-node>
    <div class="action-row">
        <button mat-icon-button (click)="deleteGroup(node); $event.stopPropagation()"
                *ngIf="node.children.length === 0 && node.level !== 0"
                color="warn"
                matTooltip="{{'group_overview.tooltips.delete' | translate}}">
            <mat-icon class="delete">delete</mat-icon>
        </button>
        <button mat-icon-button (click)="createNewGroup(node); $event.stopPropagation()"
                color="primary"
                matTooltip="{{'group_overview.tooltips.create_new' | translate}}">
            <mat-icon>add</mat-icon>
        </button>
        <button mat-icon-button (click)="editGroup(node); $event.stopPropagation()"
                color="primary"
                matTooltip="{{'group_overview.tooltips.edit_name' | translate}}">
            <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button (click)="changeParent(node); $event.stopPropagation()"
                *ngIf="node.level !== 0"
                color="primary"
                matTooltip="{{'group_overview.tooltips.change_parent' | translate}}">
            <mat-icon>change_circle</mat-icon>
        </button>
        <button mat-icon-button (click)="openGroup(node); $event.stopPropagation()"
                color="primary"
                matTooltip="{{'group_overview.tooltips.user' | translate}}">
            <mat-icon>group</mat-icon>
        </button>
    </div>
</ng-template>
