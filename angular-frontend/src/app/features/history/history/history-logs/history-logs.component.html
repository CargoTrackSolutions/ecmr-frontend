@for (log of historyLogs; track log) {
    <div class="d-flex flex-row p-3 gap-4 align-items-center justify-content-between data-container">
        <div class="d-flex flex-row gap-2">
            @switch (log.actionType) {
                @case (ActionType.Creation) {
                    <mat-icon color="primary">add</mat-icon>
                }
                @case (ActionType.Edit) {
                    <mat-icon color="primary">edit</mat-icon>
                }
            }
            <div>{{ ('history.log.actiontype.' + log.actionType.toLowerCase()) | translate }}</div>
        </div>
        <div class="d-flex flex-column">
            <div>{{ dateTimeService.transformDate(log.timestamp) }}</div>
            <div>{{ log.actionFrom }}</div>
        </div>
    </div>
}
