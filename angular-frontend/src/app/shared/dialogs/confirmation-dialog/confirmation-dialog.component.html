<h2 mat-dialog-title> {{ 'confirmation.title' | translate }} </h2>
<mat-dialog-content>
    <p class="mt-3">{{ data.text }}</p>
</mat-dialog-content>

<mat-dialog-actions [align]="'center'">
    <button mat-flat-button (click)="close(false)" color="warn">{{ 'confirmation.cancel' | translate }}</button>
    <button mat-flat-button (click)="close(true)" color="primary">{{ 'confirmation.accept' | translate }}</button>
</mat-dialog-actions>
