<section>
    <h2> {{ 'confirmation.title' | translate }} </h2>

    <mat-dialog-content>
        <p>{{ data.text }}</p>
    </mat-dialog-content>

    <mat-dialog-actions>
        <button mat-flat-button (click)="close(false)" color="primary">{{ 'confirmation.cancel' | translate }}</button>
        <button mat-flat-button (click)="close(true)" color="warn">{{ 'confirmation.accept' | translate }}</button>
    </mat-dialog-actions>
</section>
