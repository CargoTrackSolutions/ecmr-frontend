server {

  listen 8080;
  sendfile on;

  default_type application/octet-stream;

  gzip on;
  gzip_http_version 1.1;
  gzip_disable      "MSIE [1-6]\.";
  gzip_min_length   1100;
  gzip_vary         on;
  gzip_proxied      expired no-cache no-store private auth;
  gzip_types        text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_comp_level   9;

  root /usr/share/nginx/html;

  location / {
    try_files $uri $uri/ /index.html;
    add_header Content-Security-Policy "connect-src 'self' localhost:8080 *.microsoftonline.com; font-src 'self' *.googleapis.com *.gstatic.com *.jsdelivr.net; frame-src 'self'; script-src 'self' 'unsafe-inline' *.cloudflareinsights.com 'unsafe-eval'; style-src 'self' 'unsafe-inline' *.googleapis.com; frame-ancestors 'self'; img-src 'self' data:; manifest-src 'self'; media-src 'self'; object-src 'self'; worker-src 'self';" always;
  }

}
