server {

  listen 8080;
  sendfile on;

  default_type application/octet-stream;

  gzip on;
  gzip_http_version 1.1;
  gzip_disable      "MSIE [1-6]\.";
  gzip_min_length   1100;
  gzip_vary         on;
  gzip_proxied      expired no-cache no-store private auth;
  gzip_types        text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_comp_level   9;

  root /usr/share/nginx/html;

  location /api/ {
    proxy_pass http://ecmr-backend:8081;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Content-Security-Policy "connect-src 'self' http://localhost:8080 http://localhost:8081 http://localhost:8082 http://92.82.187.143:8080 http://92.82.187.143:8081 http://92.82.187.143:8082 *.microsoftonline.com; font-src 'self' *.googleapis.com *.gstatic.com *.jsdelivr.net; frame-src 'self'; script-src 'self' 'unsafe-inline' *.cloudflareinsights.com 'unsafe-eval'; style-src 'self' 'unsafe-inline' *.googleapis.com; frame-ancestors 'self'; img-src 'self' data:; manifest-src 'self'; media-src 'self'; object-src 'self'; worker-src 'self';" always;
  }

}
